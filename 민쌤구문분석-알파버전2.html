<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Min's AI Structural Analyzer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; color: #e2e8f0; font-family: 'Pretendard', sans-serif; padding: 40px 20px; line-height: 2.0; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { text-align: center; color: #38bdf8; font-size: 24px; font-weight: 800; margin-bottom: 5px; }
  .subtitle { text-align: center; color: #64748b; font-size: 13px; margin-bottom: 40px; }
  .input-section { background: #1e293b; padding: 25px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 30px; }
  textarea { width: 100%; height: 140px; padding: 18px; background: #0f172a; color: #f1f5f9; border: 1px solid #475569; border-radius: 8px; font-size: 16px; resize: vertical; line-height: 1.6; font-family: inherit; }
  .btn-container { text-align: center; margin-top: 15px; }
  button { background: #334155; color: #38bdf8; border: 1px solid #38bdf8; padding: 12px 50px; font-size: 17px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: 0.2s; }
  button:hover { background: #38bdf8; color: #0f172a; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #resultSection { display: none; margin-top: 20px; }
  .legend-box { background: #111827; border: 1px solid #334155; border-radius: 10px; padding: 20px; margin-bottom: 25px; }
  .legend-title { color: #38bdf8; font-weight: 800; margin-bottom: 10px; font-size: 13px; letter-spacing: 1px; }
  .l-tag { font-family: monospace; font-weight: bold; font-size: 15px; }
  .p-noun { color: #fbbf24; font-weight: bold; }
  .p-adj { color: #22d3ee; font-weight: bold; }
  .p-adv { color: #c084fc; font-weight: bold; }
  .role-tag { display: inline-block; font-size: 11px; font-weight: 600; margin-left: 4px; padding: 0px 5px; border-radius: 3px; vertical-align: middle; line-height: 1.5; }
  .r-n { color: #fbbf24; border: 1px solid #fbbf24; background: rgba(251, 191, 36, 0.1); }
  .r-adj { color: #22d3ee; border: 1px solid #22d3ee; background: rgba(34, 211, 238, 0.1); }
  .r-v { color: #c084fc; border: 1px solid #c084fc; background: rgba(192, 132, 252, 0.1); }
  .sentence-block { background: #1e293b; border-radius: 12px; padding: 25px; margin-bottom: 25px; border: 1px solid #334155; }
  .eng { font-size: 19px; color: #ffffff; font-weight: 500; margin-bottom: 12px; line-height: 1.8; }
  .kor-chunk { color: #cbd5e1; font-size: 15.5px; border-top: 1px solid #334155; padding-top: 12px; margin-top: 15px; line-height: 1.8; }
  .chunk-bar { color: #38bdf8; margin: 0 8px; font-weight: bold; }
  .vocab-section { background: #1e293b; border-radius: 12px; padding: 25px; border: 1px solid #334155; margin-top: 30px; }
  .vocab-title { color: #38bdf8; font-size: 16px; font-weight: 800; margin-bottom: 15px; border-bottom: 1px dashed #334155; padding-bottom: 10px; }
  .vocab-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .vocab-item { background: #0f172a; padding: 10px; border-radius: 6px; font-size: 14px; border: 1px solid #334155; }
  .vocab-item b { color: #38bdf8; display: block; margin-bottom: 3px; }
  .etymology { color: #94a3b8; font-size: 12px; font-style: italic; }
  .loading { text-align: center; color: #38bdf8; font-weight: bold; display: none; margin-top: 10px; }
</style>
</head>
<body>
<div class="container">
  <h1>Structural Big-Chunk Analyzer</h1>
  <div class="subtitle">민쌤의 실시간 AI 구문분석 시스템</div>
  <div class="input-section">
    <textarea id="passageInput" placeholder="분석할 영어 지문을 입력하세요..."></textarea>
    <div class="btn-container">
      <button id="analyzeBtn" onclick="analyzeWithAI()">구문 분석 시작</button>
    </div>
    <div id="loadingStatus" class="loading">AI 분석 중... 잠시만 기다려 주세요.</div>
  </div>
  <div id="resultSection">
    <div class="legend-box">
      <div class="legend-title">PARSING SYMBOLS</div>
      <span class="l-tag p-noun">[ ]</span> : 명사구/절 <span class="l-tag p-adj">( )</span> : 형용사구/절 <span class="l-tag p-adv">&lt; &gt;</span> : 부사구/절
    </div>
    <div id="outputArea"></div>
  </div>
</div>
<script>
async function analyzeWithAI() {
  const apiKey = "AIzaSyD-WM-ga8mOqM6_Bv27M32j6xNnI1adAgY"; 
  const input = document.getElementById('passageInput').value;
  const btn = document.getElementById('analyzeBtn');
  const loading = document.getElementById('loadingStatus');

  if(!input.trim()) return alert("지문을 입력해주세요.");

  btn.disabled = true;
  loading.style.display = 'block';

  const systemPrompt = `당신은 전문 영어 강사 '민쌤'입니다. 입력된 영어 지문을 분석하여 아래 HTML 구조로만 출력하세요. 1. 구문 분석 기호: 명사구/절 [ ], 형용사구/절 ( ), 부사구/절 < >. 2. 화살표 라벨: 기호 뒤에 r-n, r-adj, r-v 태그 삽입. 3. 큰 청크 단위 직독직해. 4. 어원 포함 어휘 정리. 모든 내용을 sentence-block 클래스로 감싸세요.`;

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: systemPrompt + "\n\n지문:\n" + input }] }]
      })
    });

    if (!response.ok) {
      throw new Error(`API 오류: ${response.status}`);
    }

    const data = await response.json();
    let resultHtml = data.candidates[0].content.parts[0].text;
    resultHtml = resultHtml.replace(/```html|```/g, '');

    document.getElementById('outputArea').innerHTML = resultHtml;
    document.getElementById('resultSection').style.display = 'block';
  } catch (error) {
    alert("에러 발생: " + error.message + "\nAPI 키가 유효한지 또는 인터넷 연결을 확인해주세요.");
  } finally {
    btn.disabled = false;
    loading.style.display = 'none';
  }
}
</script>
</body>
</html>
